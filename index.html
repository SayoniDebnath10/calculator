<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h3>CALCULATOR</h3>
    </div>
    <div class="container">
      <div class="wrapper">
          <input type="text" id="textbox" placeholder="" value="" readonly>
        <span class="calculatorbody">
          <!-- <span class="operators"> -->
            <button class="operator" id="sum">+</button>

            <button class="operator" id="sub">-</button>

            <button class="operator" id="div">/</button>

            <button class="operator" id="mul">*</button>
          <!-- </span> -->

          <!-- <span class="numbers"> -->
            <button class="number" id="zero">0</button>
            <button class="number" id="one">1</button>
            <button class="number" id="two">2</button>
            <button class="number"  id="three">3</button>
            <button class="number" id="four">4</button>
            <button class="number" id="five">5</button>
            <button class="number"  id="six">6</button>
            <button class="number" id="seven">7</button>
            <button class="number" id="eight">8</button>
            <button class="number" id="nine">9</button>
            <button class="number" id="dot">.</button>
          <!-- </span> -->
          <!-- <span class="showresult"> -->
            
            <button id="result">=</button>
            <button id="clear">C</button>

          </span>
          <span class="clear"></span>
        </span>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
